name: Build iOS App

on:
  push:
    branches: [main, master]
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-14

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install XcodeGen
        run: brew install xcodegen

      - name: Generate Xcode project
        run: |
          xcodegen generate --spec project.yml
          sed -i '' 's/objectVersion = [0-9]*;/objectVersion = 60;/' ScrollingScreenshot.xcodeproj/project.pbxproj
          sed -i '' 's/compatibilityVersion = "[^"]*";/compatibilityVersion = "Xcode 15.0";/' ScrollingScreenshot.xcodeproj/project.pbxproj

      - name: Build app
        run: |
          set -e
          xcodebuild build \
            -project ScrollingScreenshot.xcodeproj \
            -scheme ScrollingScreenshot \
            -sdk iphoneos \
            -configuration Release \
            -derivedDataPath build/DD \
            ONLY_ACTIVE_ARCH=NO \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGNING_REQUIRED=NO \
            DEVELOPMENT_TEAM="" \
            2>&1 | tee build.log

      - name: Upload build log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: build-log
          path: build.log
          retention-days: 3

      - name: Create IPA
        run: |
          brew install ldid

          # Find the .app
          APP=$(find build/DD -name "ScrollingScreenshot.app" -type d | head -1)
          echo "App: $APP"

          # Pseudo-sign the binary (ldid adds a minimal signature structure)
          # This will be replaced by Sideloadly/爱思助手 with user's real cert
          echo "=== Pseudo-signing ==="
          ldid -S "$APP/ScrollingScreenshot"
          echo "Pseudo-signing complete"

          # Verify executable
          echo "=== Executable ==="
          file "$APP/ScrollingScreenshot"

          # Create IPA
          mkdir -p Payload
          cp -R "$APP" Payload/
          ditto -c -k --keepParent Payload ScrollingScreenshot.ipa
          rm -rf Payload
          echo "IPA: $(ls -lh ScrollingScreenshot.ipa)"

      - name: Upload IPA
        uses: actions/upload-artifact@v4
        with:
          name: ScrollingScreenshot.ipa
          path: ScrollingScreenshot.ipa
          retention-days: 7
