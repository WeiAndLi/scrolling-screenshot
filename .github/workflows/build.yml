name: Build iOS App

on:
  push:
    branches: [main, master]
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-14

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install XcodeGen
        run: brew install xcodegen

      - name: Generate Xcode project
        run: |
          xcodegen generate --spec project.yml
          sed -i '' 's/objectVersion = [0-9]*;/objectVersion = 60;/' ScrollingScreenshot.xcodeproj/project.pbxproj
          sed -i '' 's/compatibilityVersion = "[^"]*";/compatibilityVersion = "Xcode 15.0";/' ScrollingScreenshot.xcodeproj/project.pbxproj

      - name: Build app
        run: |
          set -e
          # Force clean build, use explicit output path
          rm -rf build/Products
          xcodebuild clean build \
            -project ScrollingScreenshot.xcodeproj \
            -scheme ScrollingScreenshot \
            -sdk iphoneos \
            -configuration Release \
            CONFIGURATION_BUILD_DIR="$(pwd)/build/Products" \
            ONLY_ACTIVE_ARCH=NO \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGNING_REQUIRED=NO \
            DEVELOPMENT_TEAM="" \
            2>&1 | tee build.log

          # Show what was built
          echo "=== Build products ==="
          ls -la build/Products/
          echo "=== Any binaries ==="
          find build -name "ScrollingScreenshot" -type f 2>/dev/null | head -10

      - name: Upload build log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: build-log
          path: build.log
          retention-days: 3

      - name: Create IPA
        run: |
          # Find the .app
          APP=$(find build -name "ScrollingScreenshot.app" -type d | head -1)
          echo "App: $APP"

          # Verify .app structure
          echo "=== App structure ==="
          ls -laR "$APP/" | head -30
          echo "=== Looking for binary ==="
          BIN="$APP/ScrollingScreenshot"
          if [ -f "$BIN" ]; then
            file "$BIN"
            echo "Binary OK"
          else
            echo "ERROR: Binary not found at $BIN"
            find build/DD -name "ScrollingScreenshot" -type f 2>/dev/null | head -5
            exit 1
          fi

          # Use ldid pseudo-signing
          echo "=== ldid signing ==="
          brew install ldid 2>&1 | tail -1
          ldid -S "$BIN"
          echo "ldid exit: $?"

          # Create IPA
          mkdir -p Payload
          cp -R "$APP" Payload/
          ditto -c -k --keepParent Payload ScrollingScreenshot.ipa
          rm -rf Payload
          echo "IPA: $(ls -lh ScrollingScreenshot.ipa)"

      - name: Upload IPA
        uses: actions/upload-artifact@v4
        with:
          name: ScrollingScreenshot.ipa
          path: ScrollingScreenshot.ipa
          retention-days: 7
