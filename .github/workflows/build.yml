name: Build iOS App

on:
  push:
    branches: [main, master]
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-14

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install XcodeGen
        run: brew install xcodegen

      - name: Show available Xcode versions
        run: |
          ls -d /Applications/Xcode*.app
          echo "Default Xcode: $(xcodebuild -version | head -1)"

      - name: Generate Xcode project
        run: |
          xcodegen generate --spec project.yml
          # Force compatible format for Xcode 15.x
          sed -i '' 's/objectVersion = [0-9]*;/objectVersion = 60;/' ScrollingScreenshot.xcodeproj/project.pbxproj
          sed -i '' 's/compatibilityVersion = "[^"]*";/compatibilityVersion = "Xcode 15.0";/' ScrollingScreenshot.xcodeproj/project.pbxproj
          echo "=== Patched project.pbxproj ==="
          grep -E 'objectVersion|compatibilityVersion' ScrollingScreenshot.xcodeproj/project.pbxproj

      - name: Show generated project info
        run: |
          echo "=== Generated project schemes ==="
          xcodebuild -project ScrollingScreenshot.xcodeproj -list

      - name: Build unsigned app
        run: |
          set -e
          xcodebuild build \
            -project ScrollingScreenshot.xcodeproj \
            -scheme ScrollingScreenshot \
            -destination "generic/platform=iOS" \
            -configuration Release \
            -derivedDataPath build/DerivedData \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO \
            ONLY_ACTIVE_ARCH=NO \
            2>&1 | tee build.log
          echo "=== Build completed ==="

      - name: Check build result
        if: failure()
        run: |
          echo "=== Build failed. Last 100 lines of log: ==="
          tail -100 build.log

      - name: Create IPA
        run: |
          APP_PATH=$(find build/DerivedData -name "*.app" -type d -path "*/Release-iphoneos/*" | head -1)
          if [ -z "$APP_PATH" ] || [ ! -d "$APP_PATH" ]; then
            echo "ERROR: .app not found"
            echo "Searching build directory:"
            find build/DerivedData -name "*.app" -type d 2>/dev/null || echo "(no .app found)"
            find build/DerivedData -type d 2>/dev/null | head -30
            exit 1
          fi
          echo "Found app at: $APP_PATH"
          mkdir -p Payload
          cp -R "$APP_PATH" Payload/
          zip -r ScrollingScreenshot.ipa Payload/
          rm -rf Payload
          echo "IPA created: $(ls -lh ScrollingScreenshot.ipa)"

      - name: Upload IPA artifact
        uses: actions/upload-artifact@v4
        with:
          name: ScrollingScreenshot.ipa
          path: ScrollingScreenshot.ipa
          retention-days: 7
