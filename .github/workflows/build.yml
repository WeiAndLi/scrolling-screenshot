name: Build iOS App

on:
  push:
    branches: [main, master]
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-14

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install XcodeGen
        run: brew install xcodegen

      - name: Generate Xcode project
        run: |
          xcodegen generate --spec project.yml
          sed -i '' 's/objectVersion = [0-9]*;/objectVersion = 60;/' ScrollingScreenshot.xcodeproj/project.pbxproj
          sed -i '' 's/compatibilityVersion = "[^"]*";/compatibilityVersion = "Xcode 15.0";/' ScrollingScreenshot.xcodeproj/project.pbxproj

      - name: Build app
        run: |
          set -e
          xcodebuild build \
            -project ScrollingScreenshot.xcodeproj \
            -scheme ScrollingScreenshot \
            -sdk iphoneos \
            -configuration Release \
            -derivedDataPath build/DD \
            ONLY_ACTIVE_ARCH=NO \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGNING_REQUIRED=NO \
            DEVELOPMENT_TEAM="" \
            2>&1 | tee build.log

      - name: Upload build log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: build-log
          path: build.log
          retention-days: 3

      - name: Create IPA
        run: |
          brew install ldid

          # Find the .app
          APP=$(find build/DD -name "ScrollingScreenshot.app" -type d | head -1)
          echo "App: $APP"

          # Create entitlements
          cat > entitlements.plist << 'ENT'
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
          <dict>
              <key>application-identifier</key>
              <string>0000000000.com.scrollshot.app</string>
              <key>com.apple.developer.team-identifier</key>
              <string>0000000000</string>
              <key>get-task-allow</key>
              <true/>
              <key>com.apple.developer.photo-library</key>
              <true/>
          </dict>
          </plist>
          ENT

          # Pseudo-sign binary with entitlements
          echo "=== Pseudo-signing ==="
          ldid -Sentitlements.plist "$APP/ScrollingScreenshot"
          echo "Exit code: $?"

          # Verify signature structure
          echo "=== Signature check ==="
          ls -la "$APP/_CodeSignature/" 2>/dev/null || echo "No _CodeSignature dir"
          codesign -dvvv "$APP" 2>&1 || echo "codesign check failed (expected)"
          file "$APP/ScrollingScreenshot"

          # Create IPA
          mkdir -p Payload
          cp -R "$APP" Payload/
          ditto -c -k --keepParent Payload ScrollingScreenshot.ipa
          rm -rf Payload
          echo "IPA: $(ls -lh ScrollingScreenshot.ipa)"

      - name: Upload IPA
        uses: actions/upload-artifact@v4
        with:
          name: ScrollingScreenshot.ipa
          path: ScrollingScreenshot.ipa
          retention-days: 7
