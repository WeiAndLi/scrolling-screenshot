name: Build iOS App

on:
  push:
    branches: [main, master]
  workflow_dispatch:  # Allow manual trigger

jobs:
  build:
    runs-on: macos-14

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Select Xcode
        run: sudo xcode-select -s /Applications/Xcode_15.4.app

      - name: Install XcodeGen
        run: brew install xcodegen

      - name: Generate Xcode project
        run: xcodegen generate --spec project.yml

      - name: Build unsigned archive
        run: |
          xcodebuild archive \
            -project ScrollingScreenshot.xcodeproj \
            -scheme ScrollingScreenshot \
            -archivePath build/ScrollingScreenshot.xcarchive \
            -destination "generic/platform=iOS" \
            -configuration Release \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO \
            DEVELOPMENT_TEAM="" \
            ONLY_ACTIVE_ARCH=NO

      - name: Create IPA from archive
        run: |
          mkdir -p Payload
          cp -R build/ScrollingScreenshot.xcarchive/Products/Applications/ScrollingScreenshot.app Payload/
          zip -r ScrollingScreenshot.ipa Payload/
          rm -rf Payload

      - name: Upload IPA artifact
        uses: actions/upload-artifact@v4
        with:
          name: ScrollingScreenshot.ipa
          path: ScrollingScreenshot.ipa
          retention-days: 7
