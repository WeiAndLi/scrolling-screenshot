name: Build iOS App

on:
  push:
    branches: [main, master]
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-14

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install XcodeGen
        run: brew install xcodegen

      - name: Generate Xcode project
        run: |
          xcodegen generate --spec project.yml
          sed -i '' 's/objectVersion = [0-9]*;/objectVersion = 60;/' ScrollingScreenshot.xcodeproj/project.pbxproj
          sed -i '' 's/compatibilityVersion = "[^"]*";/compatibilityVersion = "Xcode 15.0";/' ScrollingScreenshot.xcodeproj/project.pbxproj

      - name: Create temp keychain and self-signed certificate
        run: |
          # Create temporary keychain
          KEYCHAIN_PATH=build.keychain
          KEYCHAIN_PASSWORD=temp123
          security create-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security default-keychain -s "$KEYCHAIN_PATH"
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security set-keychain-settings -t 3600 -u "$KEYCHAIN_PATH"

          # Generate self-signed code signing certificate
          openssl req -new -newkey rsa:2048 -days 365 -nodes -x509 \
            -subj "/CN=Temp Signing Cert" \
            -out temp-cert.pem \
            -keyout temp-key.pem

          openssl pkcs12 -export \
            -in temp-cert.pem \
            -inkey temp-key.pem \
            -out temp-cert.p12 \
            -passout pass:temp123

          # Import into keychain
          security import temp-cert.p12 \
            -k "$KEYCHAIN_PATH" \
            -P temp123 \
            -T /usr/bin/codesign \
            -T /usr/bin/xcodebuild

          # Allow codesign to use the key without prompt
          security set-key-partition-list -S apple-tool:,apple: \
            -s -k "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH" > /dev/null 2>&1

          # Find the identity hash
          IDENTITY=$(security find-identity -v -p codesigning "$KEYCHAIN_PATH" | head -1 | awk '{print $2}')
          echo "SIGNING_IDENTITY=$IDENTITY" >> $GITHUB_ENV
          echo "Using identity: $IDENTITY"
          security find-identity -v -p codesigning "$KEYCHAIN_PATH"

      - name: Build app
        run: |
          set -e
          xcodebuild build \
            -project ScrollingScreenshot.xcodeproj \
            -scheme ScrollingScreenshot \
            -sdk iphoneos \
            -configuration Release \
            CONFIGURATION_BUILD_DIR=build/Products \
            CODE_SIGN_IDENTITY="$SIGNING_IDENTITY" \
            CODE_SIGN_STYLE=Manual \
            PROVISIONING_PROFILE_SPECIFIER="" \
            DEVELOPMENT_TEAM="" \
            ONLY_ACTIVE_ARCH=NO \
            2>&1 | tee build.log

      - name: Verify app bundle
        run: |
          echo "=== App bundle ==="
          ls -la build/Products/ScrollingScreenshot.app/
          echo "=== Executable ==="
          EXEC=$(/usr/libexec/PlistBuddy -c "Print :CFBundleExecutable" build/Products/ScrollingScreenshot.app/Info.plist)
          echo "Name: $EXEC"
          file "build/Products/ScrollingScreenshot.app/$EXEC" && echo "EXECUTABLE OK" || echo "EXECUTABLE MISSING"

      - name: Upload build log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: build-log
          path: build.log
          retention-days: 3

      - name: Create IPA
        run: |
          mkdir -p Payload
          cp -R build/Products/ScrollingScreenshot.app Payload/
          ditto -c -k --keepParent Payload ScrollingScreenshot.ipa
          rm -rf Payload
          echo "IPA: $(ls -lh ScrollingScreenshot.ipa)"

      - name: Upload IPA
        uses: actions/upload-artifact@v4
        with:
          name: ScrollingScreenshot.ipa
          path: ScrollingScreenshot.ipa
          retention-days: 7
