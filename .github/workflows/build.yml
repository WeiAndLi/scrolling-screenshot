name: Build iOS App

on:
  push:
    branches: [main, master]
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-14

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install XcodeGen
        run: brew install xcodegen

      - name: Generate Xcode project
        run: |
          xcodegen generate --spec project.yml
          sed -i '' 's/objectVersion = [0-9]*;/objectVersion = 60;/' ScrollingScreenshot.xcodeproj/project.pbxproj
          sed -i '' 's/compatibilityVersion = "[^"]*";/compatibilityVersion = "Xcode 15.0";/' ScrollingScreenshot.xcodeproj/project.pbxproj

      - name: Build app
        run: |
          set -e
          xcodebuild build \
            -project ScrollingScreenshot.xcodeproj \
            -scheme ScrollingScreenshot \
            -sdk iphoneos \
            -configuration Release \
            -derivedDataPath build/DD \
            ONLY_ACTIVE_ARCH=NO \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGNING_REQUIRED=NO \
            DEVELOPMENT_TEAM="" \
            2>&1 | tee build.log

      - name: Find and check .app
        run: |
          echo "=== Searching for .app ==="
          find build/DD -name "*.app" -type d 2>/dev/null
          echo "=== Searching for executable ==="
          find build/DD -type f -perm +111 -name "ScrollingScreenshot" 2>/dev/null || echo "no exec via perm"
          find build/DD -type f -name "ScrollingScreenshot" 2>/dev/null || echo "no exec file found"
          echo "=== Full file listing ==="
          find build/DD -type f 2>/dev/null | head -50

      - name: Upload build log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: build-log
          path: build.log
          retention-days: 3

      - name: Create IPA
        run: |
          APP=$(find build/DD -name "ScrollingScreenshot.app" -type d | head -1)
          if [ -z "$APP" ]; then
            APP=$(find build/DD -name "*.app" -type d | head -1)
          fi
          if [ -z "$APP" ]; then
            echo "ERROR: No .app found"
            exit 1
          fi
          echo "Using: $APP"

          # Check executable
          NAME=$(/usr/libexec/PlistBuddy -c "Print :CFBundleExecutable" "$APP/Info.plist" 2>/dev/null || echo "unknown")
          echo "Executable name: $NAME"
          if [ -f "$APP/$NAME" ]; then
            echo "OK: $(file "$APP/$NAME")"
          else
            echo "MISSING! Listing app:"
            ls -laR "$APP" | head -30
          fi

          # Create IPA
          mkdir -p Payload
          cp -R "$APP" Payload/
          ditto -c -k --keepParent Payload ScrollingScreenshot.ipa
          rm -rf Payload
          echo "IPA: $(ls -lh ScrollingScreenshot.ipa)"

      - name: Upload IPA
        uses: actions/upload-artifact@v4
        with:
          name: ScrollingScreenshot.ipa
          path: ScrollingScreenshot.ipa
          retention-days: 7
