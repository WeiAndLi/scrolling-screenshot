name: ScrollingScreenshot
options:
  bundleIdPrefix: com.scrollshot
  deploymentTarget:
    iOS: "15.0"
  xcodeVersion: "15.0"
  generateEmptyDirectories: true

settings:
  base:
    SWIFT_VERSION: "5.0"

targets:
  ScrollingScreenshot:
    type: application
    platform: iOS
    sources:
      - path: ScrollingScreenshot
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.scrollshot.app
        INFOPLIST_FILE: ScrollingScreenshot/Info.plist
        CODE_SIGN_ENTITLEMENTS: ScrollingScreenshot/ScrollingScreenshot.entitlements
    dependencies:
      - target: BroadcastExtension

  BroadcastExtension:
    type: app-extension
    platform: iOS
    sources:
      - path: BroadcastExtension
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.scrollshot.app.broadcast
        INFOPLIST_FILE: BroadcastExtension/Info.plist
    dependencies: []

  ScrollingScreenshotTests:
    type: bundle.unit-test
    platform: iOS
    sources:
      - path: ScrollingScreenshotTests
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.scrollshot.app.tests
    dependencies:
      - target: ScrollingScreenshot
