name: ScrollingScreenshot
options:
  bundleIdPrefix: com.scrollshot
  deploymentTarget:
    iOS: "15.0"

settings:
  base:
    SWIFT_VERSION: "5.0"

targets:
  ScrollingScreenshot:
    type: application
    platform: iOS
    sources:
      - path: ScrollingScreenshot
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.scrollshot.app
        INFOPLIST_FILE: ScrollingScreenshot/Info.plist
        CODE_SIGN_STYLE: Manual
        CODE_SIGN_IDENTITY: ""
    dependencies: []
    preBuildScripts: []
    postBuildScripts: []

  ScrollingScreenshotTests:
    type: bundle.unit-test
    platform: iOS
    sources:
      - path: ScrollingScreenshotTests
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.scrollshot.app.tests
    dependencies:
      - target: ScrollingScreenshot
